# ~/.swarm/config.yaml
# Swarm worker configuration
#
# Auto-generated by first-run setup. Edit freely.
# Run `/swarm setup` to re-detect available CLIs.

default: droid          # Default backend when user doesn't specify
default_model: gpt-5.4  # Default model when user doesn't specify

# Backends: CLI commands for each agent provider
#
# Each backend defines:
#   command  — base CLI command to execute tasks
#   models   — available models for this backend
#   flags    — optional flag templates (use {model}, {session_id} as placeholders)
#
# To add a custom backend, just add a new entry following this pattern.

backends:
  droid:
    command: droid exec
    models:
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.2
      - gpt-5.2-codex
      - gpt-5.3-codex
      - gemini-3.1-pro-preview
      - gemini-3-flash-preview
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
      - glm-5
      - kimi-k2.5
    flags:
      model: "-m {model}"
      worktree: "-w"
      output_json: "-o json"
      session: "-s {session_id}"
      auto: "--auto {level}"     # low|medium|high

  codex:
    command: codex exec
    models:
      - gpt-5.3-codex
      - gpt-5.2
    flags:
      model: "-m {model}"
      session: "-s {session_id}"
      # No native worktree — dispatcher creates one and uses -C
      cwd: "-C {path}"

  claude:
    command: >
      env -u CLAUDE_CODE_ENTRYPOINT -u CLAUDECODE
      claude -p --dangerously-skip-permissions
    models:
      - opus
      - sonnet
      - haiku
    flags:
      model: "--model {model}"
      worktree: "-w"

  # Example: add amp when you have paid credits
  # amp:
  #   command: amp --execute
  #   models: [default]
  #   flags: {}

  # Example: add gemini CLI directly
  # gemini:
  #   command: gemini -p
  #   models: [default]
  #   flags: {}

# Aliases: named shortcuts with optional role prompts.
# Reference by name: "/swarm use security-reviewer to check auth"

aliases:
  quick:
    backend: droid
    model: gemini-3-flash-preview

  deep:
    backend: droid
    model: gpt-5.4

  security-reviewer:
    backend: droid
    model: gpt-5.4
    prompt: >
      You are a security-focused code reviewer.
      Prioritize OWASP Top 10 vulnerabilities, auth flaws,
      injection risks, and credential exposure.

  # Example: GPT-based code reviewer
  # gpt-reviewer:
  #   backend: codex
  #   model: gpt-5.3-codex
  #   prompt: >
  #     Focus on code quality, naming conventions, and test coverage.
